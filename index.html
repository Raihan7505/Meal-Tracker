<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f1923" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="মেস মিল" />
  <link rel="manifest" href="manifest.json" />
  <title>মেস মিল ট্র্যাকার</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1923; --green: #22c55e; --green-dark: #16a34a;
      --yellow: #fbbf24; --purple: #818cf8; --red: #f87171;
      --text: #e8f4e8; --muted: #6b7280; --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; font-family: 'Hind Siliguri', sans-serif; color: var(--text); }
    body { background: linear-gradient(135deg, #0f1923 0%, #1a2c3d 55%, #0f2318 100%); min-height: 100vh; padding-bottom: 80px; }

    /* Setup Screen */
    #setup-screen {
      position: fixed; inset: 0; background: linear-gradient(135deg, #0f1923, #1a2c3d);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 30px 24px; z-index: 1000;
    }
    .setup-icon { font-size: 60px; margin-bottom: 16px; }
    .setup-title { font-size: 22px; font-weight: 700; color: var(--green); margin-bottom: 8px; text-align: center; }
    .setup-sub { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 32px; line-height: 1.6; }
    .setup-label { font-size: 13px; color: #9ca3af; margin-bottom: 6px; align-self: flex-start; width: 100%; }
    .setup-input {
      width: 100%; padding: 14px 16px; border-radius: 14px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      color: var(--text); font-family: 'Hind Siliguri', sans-serif; font-size: 15px;
      margin-bottom: 14px; outline: none;
    }
    .setup-input:focus { border-color: var(--green); }
    .setup-btn {
      width: 100%; padding: 15px; border-radius: 14px; border: none;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: #fff; font-family: 'Hind Siliguri', sans-serif;
      font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px;
      box-shadow: 0 4px 20px rgba(34,197,94,0.35);
    }
    .member-chips { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; margin-bottom: 14px; }
    .chip {
      padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 6px; cursor: pointer;
    }
    .chip.added { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .chip.remove { background: rgba(239,68,68,0.1); color: var(--red); }

    /* Header */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,25,35,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(100,255,160,0.1);
      padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-icon { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg,var(--green),var(--green-dark)); display: flex; align-items: center; justify-content: center; font-size: 18px; }
    .header-title { font-size: 16px; font-weight: 700; }
    .header-sub { font-size: 11px; color: #6ee7a0; margin-top: 1px; }
    .user-badge { background: rgba(34,197,94,0.15); color: var(--green); padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; border: 1px solid rgba(34,197,94,0.25); }

    /* Tabs */
    .tabs { display: flex; margin: 16px 14px 0; background: rgba(255,255,255,0.05); border-radius: 14px; padding: 4px; gap: 4px; }
    .tab { flex: 1; padding: 9px 0; border: none; border-radius: 11px; font-family: 'Hind Siliguri', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .tab.active { background: linear-gradient(135deg,var(--green),var(--green-dark)); color: #fff; box-shadow: 0 2px 12px rgba(34,197,94,0.3); }
    .tab:not(.active) { background: transparent; color: var(--muted); }

    /* Month nav */
    .month-nav { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 8px; }
    .month-nav button { width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.07); color: var(--text); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .month-title { font-size: 15px; font-weight: 700; color: #a7f3c8; }

    /* Calendar */
    .cal-days-header { display: grid; grid-template-columns: repeat(7,1fr); padding: 0 12px; }
    .cal-day-name { text-align: center; font-size: 11px; color: var(--muted); padding: 4px 0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); padding: 4px 12px; gap: 3px; }
    .cal-cell { border-radius: 11px; border: 2px solid transparent; background: rgba(255,255,255,0.03); padding: 6px 2px 5px; cursor: pointer; text-align: center; transition: all 0.15s; min-height: 54px; display: flex; flex-direction: column; align-items: center; gap: 2px; user-select: none; }
    .cal-cell.has-record { background: rgba(34,197,94,0.06); }
    .cal-cell.today { border-color: rgba(34,197,94,0.35); }
    .cal-cell.selected { border-color: var(--green); background: rgba(34,197,94,0.12); }
    .cal-cell:active { transform: scale(0.94); }
    .cal-num { font-size: 13px; font-weight: 500; }
    .cal-cell.today .cal-num { color: var(--green); font-weight: 700; }
    .cal-dots { display: flex; gap: 1px; min-height: 14px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; }

    /* Day Panel */
    .day-panel { margin: 12px 12px 0; background: rgba(255,255,255,0.05); border-radius: 18px; border: 1px solid rgba(100,255,160,0.13); overflow: hidden; animation: slideUp 0.2s ease; }
    .day-panel-header { padding: 12px 16px 10px; border-bottom: 1px solid var(--border); }
    .day-panel-date { font-size: 13px; color: #6ee7a0; font-weight: 600; }
    .day-panel-hint { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Member rows */
    .member-row { display: flex; align-items: center; padding: 11px 16px; border-bottom: 1px solid var(--border); gap: 10px; }
    .member-row:last-child { border-bottom: none; }
    .member-name { flex: 1; font-size: 14px; font-weight: 600; }
    .member-name.me { color: var(--green); }
    .me-tag { font-size: 10px; background: rgba(34,197,94,0.15); color: var(--green); padding: 2px 7px; border-radius: 10px; margin-left: 4px; }
    .meal-toggle { display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 52px; }
    .meal-toggle button { padding: 5px 10px; border-radius: 20px; border: none; font-family: 'Hind Siliguri', sans-serif; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
    .meal-toggle button:active { transform: scale(0.95); }
    .meal-toggle .m-label { font-size: 10px; color: var(--muted); }
    .btn-off { background: rgba(239,68,68,0.15); color: var(--red); }
    .btn-on { background: rgba(34,197,94,0.15); color: var(--green); }
    .btn-disabled { background: rgba(255,255,255,0.05); color: var(--muted); cursor: default !important; }

    /* Summary */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 10px 12px; }
    .stat-card { background: rgba(255,255,255,0.05); border-radius: 14px; padding: 12px 6px; text-align: center; }
    .stat-card.green { border: 1px solid rgba(34,197,94,0.2); }
    .stat-card.yellow { border: 1px solid rgba(251,191,36,0.2); }
    .stat-card.purple { border: 1px solid rgba(129,140,248,0.2); }
    .stat-num { font-size: 24px; font-weight: 800; }
    .stat-card.green .stat-num { color: var(--green); }
    .stat-card.yellow .stat-num { color: var(--yellow); }
    .stat-card.purple .stat-num { color: var(--purple); }
    .stat-label { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .member-summary { margin: 0 12px; display: flex; flex-direction: column; gap: 8px; }
    .ms-card { background: rgba(255,255,255,0.04); border-radius: 14px; padding: 13px 15px; border: 1px solid var(--border); }
    .ms-name { font-size: 14px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .ms-stats { display: flex; gap: 8px; }
    .ms-stat { flex: 1; text-align: center; background: rgba(255,255,255,0.04); border-radius: 10px; padding: 8px 4px; }
    .ms-stat-num { font-size: 18px; font-weight: 800; }
    .ms-stat-label { font-size: 10px; color: var(--muted); }

    .legend { display: flex; gap: 16px; padding: 12px 16px 0; justify-content: center; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }

    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 10px 22px; border-radius: 50px; font-weight: 700; font-size: 13px; box-shadow: 0 4px 20px rgba(34,197,94,0.4); white-space: nowrap; z-index: 999; pointer-events: none; animation: fadeUp 0.2s ease; font-family: 'Hind Siliguri', sans-serif; }
    .hidden { display: none !important; }
    .online-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); display: inline-block; margin-right: 4px; animation: pulse 2s infinite; }

    @keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp { from { opacity:0; transform:translateX(-50%) translateY(8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  </style>
</head>
<body>

<!-- Setup Screen -->
<div id="setup-screen">
  <div class="setup-icon">🍽️</div>
  <div class="setup-title">মেস মিল ট্র্যাকার</div>
  <div class="setup-sub">প্রথমবার সেটআপ করুন।<br/>আপনার নাম এবং মেসের সদস্যদের নাম লিখুন।</div>

  <div class="setup-label">আপনার নাম</div>
  <input class="setup-input" id="my-name-input" placeholder="যেমন: রাইহান" maxlength="20" />

  <div class="setup-label">মেসের সদস্যদের নাম (একে একে যোগ করুন)</div>
  <div style="display:flex;gap:8px;width:100%;margin-bottom:10px;">
    <input class="setup-input" id="member-input" placeholder="যেমন: সাকিব" maxlength="20" style="margin-bottom:0;flex:1;" />
    <button class="setup-btn" onclick="addMember()" style="width:auto;padding:14px 18px;margin-top:0;">+</button>
  </div>
  <div class="member-chips" id="member-chips"></div>
  <button class="setup-btn" onclick="saveSetup()">শুরু করুন →</button>
</div>

<!-- Main App -->
<div id="main-app" class="hidden">
  <div class="header">
    <div class="header-left">
      <div class="header-icon">🍽️</div>
      <div>
        <div class="header-title">মেস মিল ট্র্যাকার</div>
        <div class="header-sub"><span class="online-dot"></span>সবার সাথে সংযুক্ত</div>
      </div>
    </div>
    <div class="user-badge" id="user-badge"></div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-calendar" onclick="switchTab('calendar')">📅 ক্যালেন্ডার</button>
    <button class="tab" id="tab-summary" onclick="switchTab('summary')">📊 সারসংক্ষেপ</button>
  </div>

  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <span class="month-title" id="month-title"></span>
    <button onclick="changeMonth(1)">›</button>
  </div>

  <div id="view-calendar">
    <div class="cal-days-header" id="day-headers"></div>
    <div class="cal-grid" id="cal-grid"></div>
    <div id="day-panel" class="hidden"></div>
    <div class="legend">
      <div class="legend-item">🟡 সকাল বন্ধ</div>
      <div class="legend-item">🟣 রাত বন্ধ</div>
    </div>
  </div>

  <div id="view-summary" class="hidden">
    <div class="stats-grid">
      <div class="stat-card yellow"><div style="font-size:18px">☀️</div><div class="stat-num" id="count-morning">0</div><div class="stat-label">সকাল বন্ধ</div></div>
      <div class="stat-card purple"><div style="font-size:18px">🌙</div><div class="stat-num" id="count-night">0</div><div class="stat-label">রাত বন্ধ</div></div>
      <div class="stat-card green"><div style="font-size:18px">🍽️</div><div class="stat-num" id="count-total">0</div><div class="stat-label">মোট বন্ধ</div></div>
    </div>
    <div class="member-summary" id="member-summary"></div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCVaxonMy0tkdWBEJoZ7zR3BdkqEKnzDoc",
  authDomain: "mess-meal-tracker-cae13.firebaseapp.com",
  projectId: "mess-meal-tracker-cae13",
  storageBucket: "mess-meal-tracker-cae13.firebasestorage.app",
  messagingSenderId: "157365910082",
  appId: "1:157365910082:web:04df58f9a4b8a3f8c7e2d1",
  measurementId: "G-M5RZCRFD5T"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const MONTHS = ["জানুয়ারি","ফেব্রুয়ারি","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্টেম্বর","অক্টোবর","নভেম্বর","ডিসেম্বর"];
const DAYS_SHORT = ["রবি","সোম","মঙ্গল","বুধ","বৃহ","শুক্র","শনি"];
const DAYS_FULL = ["রবিবার","সোমবার","মঙ্গলবার","বুধবার","বৃহস্পতিবার","শুক্রবার","শনিবার"];
const COLORS = ["#22c55e","#fbbf24","#818cf8","#f87171","#34d399","#fb923c"];

let myName = "", members = [], viewYear, viewMonth, selectedKey = null, currentTab = "calendar";
let allRecords = {}; // { dateKey: { memberName: { morning: bool, night: bool } } }
let toastTimer = null, unsubscribe = null;

function dateKey(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function parseKey(k) { const [y,m,d]=k.split("-").map(Number); return new Date(y,m-1,d); }
function getMemberColor(name) { const idx = members.indexOf(name); return COLORS[idx % COLORS.length]; }

// Setup
let tempMembers = [];
window.addMember = function() {
  const input = document.getElementById("member-input");
  const name = input.value.trim();
  if (!name || tempMembers.includes(name)) { input.value=""; return; }
  tempMembers.push(name);
  input.value = "";
  renderChips();
};
document.getElementById("member-input").addEventListener("keydown", e => { if(e.key==="Enter") window.addMember(); });

function renderChips() {
  const c = document.getElementById("member-chips");
  c.innerHTML = tempMembers.map(n => `<div class="chip added">${n} <span onclick="removeMember('${n}')" style="font-size:16px;line-height:1">×</span></div>`).join("");
}
window.removeMember = function(name) { tempMembers = tempMembers.filter(x=>x!==name); renderChips(); };

window.saveSetup = async function() {
  myName = document.getElementById("my-name-input").value.trim();
  if (!myName) { showToast("আপনার নাম দিন!"); return; }
  if (tempMembers.length === 0) { showToast("অন্তত একজন সদস্য যোগ করুন!"); return; }
  members = [myName, ...tempMembers.filter(x=>x!==myName)];
  localStorage.setItem("mess-setup", JSON.stringify({ myName, members }));
  startApp();
};

function loadSetup() {
  const saved = localStorage.getItem("mess-setup");
  if (saved) { const d = JSON.parse(saved); myName = d.myName; members = d.members; return true; }
  return false;
}

function startApp() {
  document.getElementById("setup-screen").classList.add("hidden");
  document.getElementById("main-app").classList.remove("hidden");
  document.getElementById("user-badge").textContent = myName;
  const now = new Date();
  viewYear = now.getFullYear(); viewMonth = now.getMonth();
  renderDayHeaders();
  listenToFirestore();
}

// Firestore realtime listener
function listenToFirestore() {
  if (unsubscribe) unsubscribe();
  const colRef = collection(db, "meals");
  unsubscribe = onSnapshot(colRef, (snapshot) => {
    allRecords = {};
    snapshot.forEach(doc => { allRecords[doc.id] = doc.data(); });
    render();
  });
}

async function toggleMeal(memberName, dateKey, meal) {
  if (memberName !== myName) return;
  const ref = doc(db, "meals", dateKey);
  const snap = await getDoc(ref);
  const data = snap.exists() ? snap.data() : {};
  const memberData = data[memberName] || {};
  if (memberData[meal]) delete memberData[meal];
  else memberData[meal] = true;
  data[memberName] = memberData;
  if (Object.keys(memberData).length === 0) delete data[memberName];
  await setDoc(ref, data);
  showToast(memberData[meal] ? (meal==="morning"?"☀️ সকাল বন্ধ":"🌙 রাত বন্ধ") : "মিল চালু করা হয়েছে");
}

// Render
function renderDayHeaders() {
  document.getElementById("day-headers").innerHTML = DAYS_SHORT.map(d=>`<div class="cal-day-name">${d}</div>`).join("");
}

function render() {
  document.getElementById("month-title").textContent = `${MONTHS[viewMonth]} ${viewYear}`;
  if (currentTab==="calendar") renderCalendar();
  else renderSummary();
}

function renderCalendar() {
  const now = new Date();
  const todayKey = dateKey(now.getFullYear(),now.getMonth(),now.getDate());
  const firstDay = new Date(viewYear,viewMonth,1).getDay();
  const daysInMonth = new Date(viewYear,viewMonth+1,0).getDate();
  let html = "";
  for(let i=0;i<firstDay;i++) html+=`<div></div>`;
  for(let d=1;d<=daysInMonth;d++) {
    const k = dateKey(viewYear,viewMonth,d);
    const dayData = allRecords[k] || {};
    const hasAny = Object.keys(dayData).length > 0;
    const isToday = k===todayKey, isSel = k===selectedKey;
    let cls = "cal-cell";
    if(hasAny) cls+=" has-record";
    if(isToday) cls+=" today";
    if(isSel) cls+=" selected";
    // dots for members
    let dots = "";
    members.forEach(m => {
      const rec = dayData[m] || {};
      if(rec.morning) dots += `<div class="cal-dot" style="background:#fbbf24"></div>`;
      if(rec.night) dots += `<div class="cal-dot" style="background:#818cf8"></div>`;
    });
    html += `<div class="${cls}" onclick="selectDay('${k}')">
      <span class="cal-num">${d}</span>
      <div class="cal-dots">${dots}</div>
    </div>`;
  }
  document.getElementById("cal-grid").innerHTML = html;
  renderDayPanel();
}

window.selectDay = function(k) { selectedKey = selectedKey===k?null:k; renderCalendar(); };

function renderDayPanel() {
  const panel = document.getElementById("day-panel");
  if(!selectedKey) { panel.className="hidden"; return; }
  const d = parseKey(selectedKey);
  const dayData = allRecords[selectedKey] || {};
  let rows = members.map(name => {
    const rec = dayData[name] || {};
    const isMe = name===myName;
    const color = getMemberColor(name);
    const mOff = !!rec.morning, nOff = !!rec.night;
    return `<div class="member-row">
      <div class="member-name ${isMe?'me':''}" style="${isMe?'':'color:'+color}">${name}${isMe?'<span class="me-tag">আমি</span>':''}</div>
      <div class="meal-toggle">
        <span class="m-label">☀️ সকাল</span>
        <button class="${isMe?(mOff?'btn-off':'btn-on'):'btn-disabled'}"
          ${isMe?`onclick="handleToggle('${name}','${selectedKey}','morning')"`:''}>${mOff?"বন্ধ":"চালু"}</button>
      </div>
      <div class="meal-toggle">
        <span class="m-label">🌙 রাত</span>
        <button class="${isMe?(nOff?'btn-off':'btn-on'):'btn-disabled'}"
          ${isMe?`onclick="handleToggle('${name}','${selectedKey}','night')"`:''}>${nOff?"বন্ধ":"চালু"}</button>
      </div>
    </div>`;
  }).join("");
  panel.className = "day-panel";
  panel.innerHTML = `<div class="day-panel-header">
    <div class="day-panel-date">${DAYS_FULL[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}</div>
    <div class="day-panel-hint">শুধু নিজেরটা পরিবর্তন করতে পারবেন</div>
  </div>${rows}`;
}

window.handleToggle = function(name, key, meal) { toggleMeal(name, key, meal); };

function renderSummary() {
  const monthData = Object.entries(allRecords).filter(([k])=>{
    const d=parseKey(k); return d.getMonth()===viewMonth && d.getFullYear()===viewYear;
  });
  let totalM=0, totalN=0;
  const memberStats = {};
  members.forEach(m => memberStats[m]={morning:0,night:0});
  monthData.forEach(([,dayData])=>{
    members.forEach(m=>{
      const rec=dayData[m]||{};
      if(rec.morning){totalM++;memberStats[m].morning++;}
      if(rec.night){totalN++;memberStats[m].night++;}
    });
  });
  document.getElementById("count-morning").textContent=totalM;
  document.getElementById("count-night").textContent=totalN;
  document.getElementById("count-total").textContent=totalM+totalN;
  const color = getMemberColor;
  document.getElementById("member-summary").innerHTML = members.map(m=>{
    const s=memberStats[m]; const c=color(m); const isMe=m===myName;
    return `<div class="ms-card">
      <div class="ms-name" style="color:${isMe?'var(--green)':c}">${m}${isMe?' <span class="me-tag">আমি</span>':''}</div>
      <div class="ms-stats">
        <div class="ms-stat"><div class="ms-stat-num" style="color:#fbbf24">${s.morning}</div><div class="ms-stat-label">☀️ সকাল বন্ধ</div></div>
        <div class="ms-stat"><div class="ms-stat-num" style="color:#818cf8">${s.night}</div><div class="ms-stat-label">🌙 রাত বন্ধ</div></div>
        <div class="ms-stat"><div class="ms-stat-num" style="color:${isMe?'var(--green)':c}">${s.morning+s.night}</div><div class="ms-stat-label">মোট</div></div>
      </div>
    </div>`;
  }).join("");
}

window.changeMonth = function(dir) {
  viewMonth+=dir;
  if(viewMonth>11){viewMonth=0;viewYear++;}
  if(viewMonth<0){viewMonth=11;viewYear--;}
  selectedKey=null; render();
};

window.switchTab = function(tab) {
  currentTab=tab;
  document.getElementById("tab-calendar").className="tab"+(tab==="calendar"?" active":"");
  document.getElementById("tab-summary").className="tab"+(tab==="summary"?" active":"");
  document.getElementById("view-calendar").className=tab==="calendar"?"":"hidden";
  document.getElementById("view-summary").className=tab==="summary"?"":"hidden";
  render();
};

function showToast(msg) {
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.remove("hidden");
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.add("hidden"),2000);
}
window.showToast = showToast;

// Init
if(loadSetup()) startApp();
else document.getElementById("setup-screen").classList.remove("hidden");

if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
</script>
</body>
</html>
