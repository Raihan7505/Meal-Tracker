<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f1923" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="মেস মিল" />
  <meta name="description" content="মেসের মিল বন্ধ ট্র্যাক করুন সহজেই" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>মেস মিল ট্র্যাকার</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1923;
      --bg2: #1a2c3d;
      --green: #22c55e;
      --green-dark: #16a34a;
      --green-dim: rgba(34,197,94,0.12);
      --yellow: #fbbf24;
      --purple: #818cf8;
      --text: #e8f4e8;
      --muted: #6b7280;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Hind Siliguri', sans-serif; overflow-x: hidden; }
    body { background: linear-gradient(135deg, #0f1923 0%, #1a2c3d 55%, #0f2318 100%); min-height: 100vh; padding-bottom: 80px; }

    /* Header */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,25,35,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(100,255,160,0.1);
      padding: 14px 20px;
      display: flex; align-items: center; gap: 14px;
    }
    .header-icon {
      width: 42px; height: 42px; border-radius: 13px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(34,197,94,0.3);
    }
    .header-title { font-size: 17px; font-weight: 700; letter-spacing: 0.2px; }
    .header-sub { font-size: 11px; color: #6ee7a0; margin-top: 1px; }

    /* Tabs */
    .tabs { display: flex; margin: 18px 16px 0; background: rgba(255,255,255,0.05); border-radius: 14px; padding: 4px; gap: 4px; }
    .tab { flex: 1; padding: 10px 0; border: none; border-radius: 11px; font-family: 'Hind Siliguri', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .tab.active { background: linear-gradient(135deg, var(--green), var(--green-dark)); color: #fff; box-shadow: 0 2px 12px rgba(34,197,94,0.3); }
    .tab:not(.active) { background: transparent; color: var(--muted); }

    /* Month nav */
    .month-nav { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px 8px; }
    .month-nav button { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.07); color: var(--text); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
    .month-nav button:active { background: var(--green-dim); }
    .month-title { font-size: 16px; font-weight: 700; color: #a7f3c8; }

    /* Calendar */
    .cal-days-header { display: grid; grid-template-columns: repeat(7,1fr); padding: 0 14px; }
    .cal-day-name { text-align: center; font-size: 11px; color: var(--muted); padding: 4px 0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); padding: 4px 14px; gap: 4px; }
    .cal-cell {
      border-radius: 12px; border: 2px solid transparent;
      background: rgba(255,255,255,0.03);
      padding: 7px 3px 6px; cursor: pointer;
      text-align: center; transition: all 0.15s;
      min-height: 56px; display: flex; flex-direction: column; align-items: center; gap: 2px;
      user-select: none;
    }
    .cal-cell.has-record { background: rgba(34,197,94,0.06); }
    .cal-cell.today { border-color: rgba(34,197,94,0.35); }
    .cal-cell.selected { border-color: var(--green); background: rgba(34,197,94,0.13); }
    .cal-cell:active { transform: scale(0.95); }
    .cal-num { font-size: 14px; font-weight: 500; }
    .cal-cell.today .cal-num { color: var(--green); font-weight: 700; }
    .cal-icons { display: flex; gap: 2px; min-height: 16px; align-items: center; }
    .cal-icon { font-size: 10px; line-height: 1; }

    /* Day Panel */
    .day-panel {
      margin: 14px 14px 0;
      background: rgba(255,255,255,0.05);
      border-radius: 18px;
      border: 1px solid rgba(100,255,160,0.13);
      overflow: hidden;
      animation: slideUp 0.2s ease;
    }
    .day-panel-header { padding: 13px 17px 10px; border-bottom: 1px solid var(--border); }
    .day-panel-date { font-size: 13px; color: #6ee7a0; font-weight: 600; }
    .day-panel-hint { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .meal-btns { display: flex; }
    .meal-btn {
      flex: 1; padding: 15px 10px; border: none;
      font-family: 'Hind Siliguri', sans-serif; cursor: pointer; transition: all 0.2s;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
    }
    .meal-btn:active { transform: scale(0.97); }
    .meal-btn .m-icon { font-size: 26px; }
    .meal-btn .m-label { font-size: 13px; font-weight: 600; }
    .meal-btn .m-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 700; }
    .meal-btn.morning { border-right: 1px solid var(--border); }
    .meal-btn.morning.off { background: rgba(251,191,36,0.1); color: #fbbf24; }
    .meal-btn.morning:not(.off) { background: transparent; color: var(--muted); }
    .meal-btn.night.off { background: rgba(129,140,248,0.1); color: #818cf8; }
    .meal-btn.night:not(.off) { background: transparent; color: var(--muted); }
    .m-badge.on { background: rgba(255,255,255,0.08); color: var(--muted); }
    .meal-btn.morning.off .m-badge { background: #fbbf24; color: #000; }
    .meal-btn.night.off .m-badge { background: #818cf8; color: #000; }

    /* Legend */
    .legend { display: flex; gap: 18px; padding: 13px 18px 0; justify-content: center; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }

    /* Summary */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 12px 14px; }
    .stat-card { background: rgba(255,255,255,0.05); border-radius: 16px; padding: 14px 8px; text-align: center; }
    .stat-card.green { border: 1px solid rgba(34,197,94,0.25); }
    .stat-card.yellow { border: 1px solid rgba(251,191,36,0.25); }
    .stat-card.purple { border: 1px solid rgba(129,140,248,0.25); }
    .stat-icon { font-size: 20px; }
    .stat-num { font-size: 26px; font-weight: 800; line-height: 1.2; }
    .stat-card.green .stat-num { color: var(--green); }
    .stat-card.yellow .stat-num { color: var(--yellow); }
    .stat-card.purple .stat-num { color: var(--purple); }
    .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

    .record-list { display: flex; flex-direction: column; gap: 8px; padding: 0 14px; }
    .record-item { background: rgba(255,255,255,0.04); border-radius: 14px; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border); }
    .record-date { font-size: 14px; font-weight: 600; }
    .record-day { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .record-tags { display: flex; gap: 6px; }
    .tag { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
    .tag.morning { background: rgba(251,191,36,0.15); color: var(--yellow); }
    .tag.night { background: rgba(129,140,248,0.15); color: var(--purple); }

    .empty { text-align: center; color: var(--muted); padding: 44px 0; font-size: 14px; }
    .section-label { font-size: 12px; color: var(--muted); padding: 0 14px; margin-bottom: 8px; }

    .clear-btn {
      margin: 18px 14px 0; width: calc(100% - 28px); padding: 13px;
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2);
      border-radius: 14px; color: #f87171; cursor: pointer;
      font-family: 'Hind Siliguri', sans-serif; font-size: 14px; font-weight: 600;
      transition: background 0.15s;
    }
    .clear-btn:active { background: rgba(239,68,68,0.18); }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: var(--green); color: #000; padding: 10px 22px;
      border-radius: 50px; font-weight: 700; font-size: 13px;
      box-shadow: 0 4px 20px rgba(34,197,94,0.4);
      white-space: nowrap; z-index: 999; pointer-events: none;
      animation: fadeUp 0.2s ease;
      font-family: 'Hind Siliguri', sans-serif;
    }
    .hidden { display: none; }

    @keyframes slideUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp { from { opacity:0; transform:translateX(-50%) translateY(8px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-icon">🍽️</div>
  <div>
    <div class="header-title">মেস মিল ট্র্যাকার</div>
    <div class="header-sub">কোন বেলা মিল বন্ধ ছিল মনে রাখুন</div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" id="tab-calendar" onclick="switchTab('calendar')">📅 ক্যালেন্ডার</button>
  <button class="tab" id="tab-summary" onclick="switchTab('summary')">📊 সারসংক্ষেপ</button>
</div>

<!-- Month Nav -->
<div class="month-nav">
  <button onclick="changeMonth(-1)">‹</button>
  <span class="month-title" id="month-title"></span>
  <button onclick="changeMonth(1)">›</button>
</div>

<!-- Calendar View -->
<div id="view-calendar">
  <div class="cal-days-header" id="day-headers"></div>
  <div class="cal-grid" id="cal-grid"></div>
  <div id="day-panel" class="hidden"></div>
  <div class="legend">
    <div class="legend-item">☀️ সকাল বন্ধ</div>
    <div class="legend-item">🌙 রাত বন্ধ</div>
  </div>
</div>

<!-- Summary View -->
<div id="view-summary" class="hidden">
  <div class="stats-grid">
    <div class="stat-card yellow">
      <div class="stat-icon">☀️</div>
      <div class="stat-num" id="count-morning">0</div>
      <div class="stat-label">সকাল বন্ধ</div>
    </div>
    <div class="stat-card purple">
      <div class="stat-icon">🌙</div>
      <div class="stat-num" id="count-night">0</div>
      <div class="stat-label">রাত বন্ধ</div>
    </div>
    <div class="stat-card green">
      <div class="stat-icon">🍽️</div>
      <div class="stat-num" id="count-total">0</div>
      <div class="stat-label">মোট বন্ধ</div>
    </div>
  </div>
  <div class="section-label" id="summary-label"></div>
  <div class="record-list" id="record-list"></div>
  <button class="clear-btn hidden" id="clear-btn" onclick="clearMonth()">🗑️ এই মাসের সব রেকর্ড মুছুন</button>
</div>

<!-- Toast -->
<div class="toast hidden" id="toast"></div>

<script>
const STORAGE_KEY = "mess-meal-off-v2";
const MONTHS = ["জানুয়ারি","ফেব্রুয়ারি","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্টেম্বর","অক্টোবর","নভেম্বর","ডিসেম্বর"];
const DAYS_SHORT = ["রবি","সোম","মঙ্গল","বুধ","বৃহ","শুক্র","শনি"];
const DAYS_FULL = ["রবিবার","সোমবার","মঙ্গলবার","বুধবার","বৃহস্পতিবার","শুক্রবার","শনিবার"];

let records = {};
let viewYear, viewMonth, selectedKey = null, currentTab = "calendar";
let toastTimer = null;

function load() {
  try { records = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch { records = {}; }
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); }

function dateKey(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function parseKey(k) { const [y,m,d] = k.split("-").map(Number); return new Date(y,m-1,d); }

function init() {
  load();
  const now = new Date();
  viewYear = now.getFullYear();
  viewMonth = now.getMonth();
  renderDayHeaders();
  render();
}

function renderDayHeaders() {
  const h = document.getElementById("day-headers");
  h.innerHTML = DAYS_SHORT.map(d => `<div class="cal-day-name">${d}</div>`).join("");
}

function render() {
  document.getElementById("month-title").textContent = `${MONTHS[viewMonth]} ${viewYear}`;
  if (currentTab === "calendar") renderCalendar();
  else renderSummary();
}

function renderCalendar() {
  const now = new Date();
  const todayKey = dateKey(now.getFullYear(), now.getMonth(), now.getDate());
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  let html = "";
  for (let i = 0; i < firstDay; i++) html += `<div></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const k = dateKey(viewYear, viewMonth, d);
    const rec = records[k] || {};
    const hasMorning = !!rec.morning, hasNight = !!rec.night;
    const isToday = k === todayKey, isSel = k === selectedKey, hasAny = hasMorning || hasNight;
    let cls = "cal-cell";
    if (hasAny) cls += " has-record";
    if (isToday) cls += " today";
    if (isSel) cls += " selected";
    html += `<div class="${cls}" onclick="selectDay('${k}')">
      <span class="cal-num">${d}</span>
      <div class="cal-icons">
        ${hasMorning ? `<span class="cal-icon">☀️</span>` : ""}
        ${hasNight ? `<span class="cal-icon">🌙</span>` : ""}
      </div>
    </div>`;
  }
  document.getElementById("cal-grid").innerHTML = html;
  renderDayPanel();
}

function selectDay(k) {
  selectedKey = selectedKey === k ? null : k;
  renderCalendar();
}

function renderDayPanel() {
  const panel = document.getElementById("day-panel");
  if (!selectedKey) { panel.className = "hidden"; return; }
  const d = parseKey(selectedKey);
  const rec = records[selectedKey] || {};
  const mOff = !!rec.morning, nOff = !!rec.night;
  panel.className = "day-panel";
  panel.innerHTML = `
    <div class="day-panel-header">
      <div class="day-panel-date">${DAYS_FULL[d.getDay()]}, ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}</div>
      <div class="day-panel-hint">কোন বেলার মিল বন্ধ ছিল?</div>
    </div>
    <div class="meal-btns">
      <button class="meal-btn morning ${mOff?'off':''}" onclick="toggleMeal('morning')">
        <span class="m-icon">☀️</span>
        <span class="m-label">সকালের মিল</span>
        <span class="m-badge ${mOff?'':'on'}">${mOff?"বন্ধ ✓":"চালু"}</span>
      </button>
      <button class="meal-btn night ${nOff?'off':''}" onclick="toggleMeal('night')">
        <span class="m-icon">🌙</span>
        <span class="m-label">রাতের মিল</span>
        <span class="m-badge ${nOff?'':'on'}">${nOff?"বন্ধ ✓":"চালু"}</span>
      </button>
    </div>`;
}

function toggleMeal(meal) {
  if (!selectedKey) return;
  const rec = records[selectedKey] ? {...records[selectedKey]} : {};
  const wasOff = !!rec[meal];
  if (wasOff) delete rec[meal]; else rec[meal] = true;
  if (Object.keys(rec).length === 0) delete records[selectedKey];
  else records[selectedKey] = rec;
  save();
  showToast(wasOff ? (meal==="morning"?"সকালের মিল চালু":"রাতের মিল চালু") : (meal==="morning"?"সকালের মিল বন্ধ ✓":"রাতের মিল বন্ধ ✓"));
  renderCalendar();
}

function renderSummary() {
  const monthRecs = Object.entries(records)
    .filter(([k]) => { const d = parseKey(k); return d.getMonth()===viewMonth && d.getFullYear()===viewYear; })
    .sort(([a],[b]) => a.localeCompare(b));

  const mCount = monthRecs.filter(([,v])=>v.morning).length;
  const nCount = monthRecs.filter(([,v])=>v.night).length;
  document.getElementById("count-morning").textContent = mCount;
  document.getElementById("count-night").textContent = nCount;
  document.getElementById("count-total").textContent = mCount + nCount;

  const clearBtn = document.getElementById("clear-btn");
  if (monthRecs.length === 0) {
    document.getElementById("summary-label").textContent = "";
    document.getElementById("record-list").innerHTML = `<div class="empty">এই মাসে কোনো মিল বন্ধ নেই</div>`;
    clearBtn.classList.add("hidden");
  } else {
    document.getElementById("summary-label").textContent = `মোট ${monthRecs.length}টি দিনে মিল বন্ধ ছিল`;
    document.getElementById("record-list").innerHTML = monthRecs.map(([k,rec]) => {
      const d = parseKey(k);
      return `<div class="record-item">
        <div><div class="record-date">${d.getDate()} ${MONTHS[d.getMonth()]}</div><div class="record-day">${DAYS_FULL[d.getDay()]}</div></div>
        <div class="record-tags">
          ${rec.morning ? `<span class="tag morning">☀️ সকাল</span>` : ""}
          ${rec.night ? `<span class="tag night">🌙 রাত</span>` : ""}
        </div>
      </div>`;
    }).join("");
    clearBtn.classList.remove("hidden");
  }
}

function clearMonth() {
  if (!confirm(`${MONTHS[viewMonth]} ${viewYear}-এর সব রেকর্ড মুছে ফেলবেন?`)) return;
  Object.keys(records).forEach(k => {
    const d = parseKey(k);
    if (d.getMonth()===viewMonth && d.getFullYear()===viewYear) delete records[k];
  });
  save(); showToast("রেকর্ড মুছে ফেলা হয়েছে"); renderSummary();
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  selectedKey = null;
  render();
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById("tab-calendar").className = "tab" + (tab==="calendar"?" active":"");
  document.getElementById("tab-summary").className = "tab" + (tab==="summary"?" active":"");
  document.getElementById("view-calendar").className = tab==="calendar" ? "" : "hidden";
  document.getElementById("view-summary").className = tab==="summary" ? "" : "hidden";
  render();
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.remove("hidden");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.add("hidden"), 2000);
}

// PWA install
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
}

init();
</script>
</body>
</html>
